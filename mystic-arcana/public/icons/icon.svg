<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#c9a84c" stroke-width="3" opacity="0.6"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  <!-- Star (pentagram) -->
  <polygon points="256,80 296,200 420,200 316,272 348,392 256,320 164,392 196,272 92,200 216,200"
    fill="none" stroke="#c9a84c" stroke-width="4" stroke-linejoin="round"/>
  <!-- Inner glow circle -->
  <circle cx="256" cy="240" r="60" fill="#c9a84c" opacity="0.15"/>
  <!-- Eye symbol in center -->
  <ellipse cx="256" cy="240" rx="45" ry="28" fill="none" stroke="#c9a84c" stroke-width="2.5"/>
  <circle cx="256" cy="240" r="14" fill="#c9a84c" opacity="0.8"/>
  <circle cx="256" cy="240" r="6" fill="#0a0a1a"/>
  <!-- Small decorative dots -->
  <circle cx="256" cy="420" r="4" fill="#c9a84c" opacity="0.5"/>
  <circle cx="220" cy="410" r="3" fill="#c9a84c" opacity="0.3"/>
  <circle cx="292" cy="410" r="3" fill="#c9a84c" opacity="0.3"/>
  <!-- Text -->
  <text x="256" y="470" text-anchor="middle" font-family="serif" font-size="36" fill="#c9a84c" letter-spacing="8">ARCANA</text>
</svg>
