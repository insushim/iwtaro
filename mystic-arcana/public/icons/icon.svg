<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1e1e4a"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d48a"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#b8864e"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e0b0"/>
      <stop offset="100%" stop-color="#d4a574"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Purple glow -->
  <circle cx="256" cy="230" r="200" fill="url(#glow)"/>

  <!-- Outer decorative ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.4"/>
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.2"/>

  <!-- Small star decorations around ring -->
  <circle cx="256" cy="40" r="3" fill="#d4a574" opacity="0.6"/>
  <circle cx="256" cy="472" r="3" fill="#d4a574" opacity="0.6"/>
  <circle cx="40" cy="256" r="3" fill="#d4a574" opacity="0.6"/>
  <circle cx="472" cy="256" r="3" fill="#d4a574" opacity="0.6"/>
  <circle cx="108" cy="108" r="2.5" fill="#d4a574" opacity="0.4"/>
  <circle cx="404" cy="108" r="2.5" fill="#d4a574" opacity="0.4"/>
  <circle cx="108" cy="404" r="2.5" fill="#d4a574" opacity="0.4"/>
  <circle cx="404" cy="404" r="2.5" fill="#d4a574" opacity="0.4"/>

  <!-- Main tarot card shape -->
  <rect x="176" y="80" width="160" height="240" rx="12" fill="none" stroke="url(#gold)" stroke-width="3"/>
  <rect x="184" y="88" width="144" height="224" rx="8" fill="none" stroke="#d4a574" stroke-width="1" opacity="0.3"/>

  <!-- Eye of Providence inside card -->
  <!-- Triangle -->
  <polygon points="256,115 310,235 202,235" fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- All-seeing eye -->
  <ellipse cx="256" cy="188" rx="36" ry="22" fill="none" stroke="url(#goldLight)" stroke-width="2.5"/>
  <circle cx="256" cy="188" r="12" fill="url(#gold)" opacity="0.9"/>
  <circle cx="256" cy="188" r="5" fill="#0a0a1a"/>
  <!-- Eye shine -->
  <circle cx="253" cy="185" r="2.5" fill="#f5e0b0" opacity="0.7"/>

  <!-- Rays from eye -->
  <line x1="256" y1="160" x2="256" y2="125" stroke="#d4a574" stroke-width="1" opacity="0.4"/>
  <line x1="237" y1="170" x2="218" y2="140" stroke="#d4a574" stroke-width="1" opacity="0.3"/>
  <line x1="275" y1="170" x2="294" y2="140" stroke="#d4a574" stroke-width="1" opacity="0.3"/>

  <!-- Moon and Sun symbols -->
  <!-- Crescent moon (left) -->
  <path d="M195,260 A16,16 0 1,1 195,290" fill="none" stroke="#d4a574" stroke-width="1.5" opacity="0.5"/>
  <circle cx="200" cy="275" r="12" fill="#0a0a1a" stroke="none"/>
  <!-- Sun (right) -->
  <circle cx="317" cy="275" r="8" fill="none" stroke="#d4a574" stroke-width="1.5" opacity="0.5"/>
  <line x1="317" y1="262" x2="317" y2="258" stroke="#d4a574" stroke-width="1" opacity="0.4"/>
  <line x1="317" y1="288" x2="317" y2="292" stroke="#d4a574" stroke-width="1" opacity="0.4"/>
  <line x1="304" y1="275" x2="300" y2="275" stroke="#d4a574" stroke-width="1" opacity="0.4"/>
  <line x1="330" y1="275" x2="334" y2="275" stroke="#d4a574" stroke-width="1" opacity="0.4"/>

  <!-- Decorative stars below card -->
  <polygon points="256,345 262,361 280,361 266,372 271,389 256,379 241,389 246,372 232,361 250,361" fill="url(#gold)" opacity="0.8"/>

  <!-- Small stars -->
  <polygon points="190,360 193,368 201,368 195,373 197,381 190,376 183,381 185,373 179,368 187,368" fill="#d4a574" opacity="0.4"/>
  <polygon points="322,360 325,368 333,368 327,373 329,381 322,376 315,381 317,373 311,368 319,368" fill="#d4a574" opacity="0.4"/>

  <!-- Text: MYSTIC -->
  <text x="256" y="420" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="bold" fill="url(#gold)" letter-spacing="10">MYSTIC</text>

  <!-- Text: ARCANA -->
  <text x="256" y="458" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#d4a574" letter-spacing="14" opacity="0.7">ARCANA</text>
</svg>
