name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'mystic-arcana/package-lock.json'

      - name: Install dependencies
        working-directory: mystic-arcana
        run: npm ci

      - name: Build
        working-directory: mystic-arcana
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=mystic-arcana --commit-message="deploy from GitHub Actions"
          workingDirectory: mystic-arcana
