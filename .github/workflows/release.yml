name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build APK
        working-directory: mystic-arcana/android
        run: gradle assembleRelease

      - name: Rename APK
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          APK_FILE=$(find mystic-arcana/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Found APK: $APK_FILE"
          cp "$APK_FILE" mystic-arcana/android/MysticArcana-${TAG_NAME}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: mystic-arcana/android/MysticArcana-*.apk
          generate_release_notes: true
          body: |
            ## MYSTIC ARCANA ${{ github.ref_name }}

            ### Download
            - **Android APK**: Download `MysticArcana-${{ github.ref_name }}.apk` below
            - **Web**: [mystic-arcana.pages.dev](https://mystic-arcana.pages.dev)
            - **iOS**: Visit the web version in Safari and tap "Add to Home Screen"

            ### Changes
            See commit history for details.
